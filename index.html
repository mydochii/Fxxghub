<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/pMv0GruO1.mp4","📍K3J4D14N T4K T3RVL4NG NG3NT M4M4 M3RTV4"],
  ["https://cdn2.videy.co/JEZkEHsb1.mp4","📍D1 B4L1K K3H3N1NG4N 3N4K NG3NT"],
  ["https://cdn2.videy.co/QFkm044C1.mp4","📍51TV451 5VL1T D1K3ND4L1K4N S44T 3GW33"],
  ["https://cdn2.videy.co/6x7icXFr1.mp4","📍D3T1K D3T1K D1 3GW33 B4P4 M3RTV4"],
  ["https://cdn2.videy.co/634kPU2Z1.mp4","📍M4L4M 5VNY1 NG3NT M4M4 M3RTV4"],
  ["https://cdn2.videy.co/V2WJyyzq1.mp4","📍S44T RVM4H K050NG NG3NT T4NT3"],
  ["https://cdn2.videy.co/2nXxac1S1.mp4","📍K3J4D14N M3ND4D4K NG3NT S4M4 IBV"],
  ["https://cdn2.videy.co/o9u0p2Bl1.mp4","📍M0M3N T3RL4R4NG NG3NT M4M4 M3RTV4"],
  ["https://cdn2.videy.co/9Xtgvyf41.mp4","📍K354L4H4N K3C1L B3RVJ0NG 3GW33"],
  ["https://cdn2.videy.co/mvDgozJF1.mp4","📍K34D44N T4K T3RK3ND4L1 D1 3GW33 BR0ND0NG"],
  ["https://cdn2.videy.co/WSunQoA61.mp4","📍S44T 53MV4 L3NG4H NG3NT M4M4 M3RTV4"],
  ["https://cdn2.videy.co/4PoJrGr31.mp4","📍C3R1T4 Y4NG D151MP4N BV4T T3RVS NG3NT T4NT3"],
  ["https://cdn2.videy.co/SpqUwKtO1.mp4","📍D1 B4L1K P1NT0 NG3NT T4NT3"],
  ["https://cdn2.videy.co/bQkMe5Gq1.mp4","📍K3J4D14N T3NG4H M4L4M NG3NT M4M4 M3RTV4"],
  ["https://cdn2.videy.co/251xSWX81.mp4","📍K3T3G4NG4N T4K T3RH1ND4RK4N"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
